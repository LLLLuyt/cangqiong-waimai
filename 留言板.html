<!DOCTYPE html>
<html lang="ZH-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>留言板</title>
    <link rel="stylesheet" href="留言板.css">
</head>
<body>
    <h1>留言板</h1>

    <div class="输入区">
        <input type="text" id="名字输入" placeholder="你的名字">
        <textarea id="留言输入" placeholder="写点什么吧..." rows="3"></textarea>
        <button id="提交按钮">提交留言</button>
    </div>

    <div class="留言区" id="留言区">
        <p id="空提示">暂无留言，来说点什么吧</p>
    </div>

    <script src="留言板.js"></script>
</body>
</html>
