<!DOCTYPE html>
<html lang="ZH-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>记账本</title>
    <link rel="stylesheet" href="记账本.css">
</head>
<body>
    <h1>记账本</h1>

    <div class="输入区">
        <input type="text" id="项目输入" placeholder="项目名（如：午饭）">
        <input type="number" id="金额输入" placeholder="金额（如：25）">
        <button id="提交按钮">记一笔</button>
    </div>

    <div class="账单区" id="账单区">
        <p id="空提示">暂无记录，记一笔吧</p>
    </div>

    <script src="记账本.js"></script>
</body>
</html>
